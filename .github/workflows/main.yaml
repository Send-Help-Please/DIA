name: Build CI

on:
  push:
    branches: ["main", "dev"]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout the code
      uses: actions/checkout@v6.0.3

    - name: Setup Node.js environment
      uses: actions/setup-node@v6.4.0
      with:
        node-version: "lts/*"
        cache: "npm"

    - name: Install dependencies
      run: npm install

    - name: Run linter
      run: npm run lint
